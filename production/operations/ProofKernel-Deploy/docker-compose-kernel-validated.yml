version: '3.9'

# ============================================================================
# CQECMPLX Proof Kernel - Hierarchical Docker-in-Docker Orchestration
# ============================================================================
# 
# Architecture:
#   Master Ruleset (docker-compose level)
#   ├─ Python Kernel Container (Level 0)
#   │  └─ Spawns Paper Validators (Level 1, 50% of Level 0 resources)
#   │     └─ Each Paper Spawns Tools (Level 2, 50% of Level 1 resources)
#   │
#   ├─ Monitoring/Support Services
#   └─ Persistent State
#
# Resource Hierarchy:
#   Level 0 (Kernel):      4GB RAM, 4 CPU → Can allocate
#   Level 1 (Papers):      2GB RAM, 2 CPU (50% of Level 0)
#   Level 2 (Tools):       1GB RAM, 1 CPU (50% of Level 1)
#
# Constraint: No child exceeds parent's allocation. All children
# operate under parent's operational constraints (ulimits, mounts, etc).
#
# ============================================================================

services:
  # =========================================================================
  # LEVEL 0: Master Python Kernel Container
  # =========================================================================
  # This is the top-level validator that orchestrates all paper validations.
  # It has full access to docker.sock and acts as the orchestrator.
  #
  # Resources: 4 GB RAM, 4 CPU cores
  # Role: Parse requests, spawn paper validators, collect receipts
  
  proof-kernel:
    image: python-dev:complete-stack
    container_name: cqecmplx-proof-kernel
    hostname: proof-kernel
    
    # =====================================================================
    # LEVEL 0: Full Resource Allocation
    # =====================================================================
    mem_limit: 4g
    memswap_limit: 4g
    cpus: 4.0
    cpu_shares: 1024
    
    # =====================================================================
    # Docker-in-Docker: Access to Host Docker Daemon
    # =====================================================================
    # This container can spawn child containers, but only via controlled
    # orchestration. See /opt/kernel/orchestrator.py
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - docker_kernel_cache:/var/lib/docker_cache
    
    # =====================================================================
    # Operational Constraints (Level 0 → Level 1 enforcement)
    # =====================================================================
    # These limits apply to processes spawned by this container.
    # Child containers will receive 50% of these values.
    ulimits:
      nproc: 4096          # Processes: Children get 2048
      nofile: 65536        # Open files: Children get 32768
      locks: 1024          # File locks: Children get 512
    
    # =====================================================================
    # Kernel Configuration
    # =====================================================================
    environment:
      # Level 0 configuration
      KERNEL_LEVEL: "0"
      KERNEL_ROLE: "orchestrator"
      KERNEL_MAX_MEMORY_MB: 4096
      KERNEL_MAX_CPU: 4
      
      # Level 1 constraints (for spawned papers)
      CHILD_LEVEL: "1"
      CHILD_MEMORY_MB: 2048          # 50% of parent (4096 / 2)
      CHILD_CPU: 2.0                 # 50% of parent (4 / 2)
      CHILD_ULIMIT_NPROC: 2048       # 50% of parent (4096 / 2)
      CHILD_ULIMIT_NOFILE: 32768     # 50% of parent (65536 / 2)
      
      # Level 2 constraints (for tools spawned by papers)
      GRANDCHILD_LEVEL: "2"
      GRANDCHILD_MEMORY_MB: 1024     # 50% of Level 1 (2048 / 2)
      GRANDCHILD_CPU: 1.0            # 50% of Level 1 (2 / 2)
      GRANDCHILD_ULIMIT_NPROC: 1024  # 50% of Level 1 (2048 / 2)
      GRANDCHILD_ULIMIT_NOFILE: 16384 # 50% of Level 1 (32768 / 2)
      
      # Orchestration settings
      CQECMPLX_OPERATOR_TOKEN: "${CQECMPLX_OPERATOR_TOKEN:-dev-token}"
      CQECMPLX_DOCKER_NETWORK: "cqecmplx-kernel-net"
      CQECMPLX_KERNEL_MODE: "production"
      
      # DNA Folding Settings
      DNA_VALIDATION_MODE: "full"    # "full", "paper", "theorem"
      DNA_WORKBOOK_ENABLED: "true"
      DNA_ITERATIVE_CONVERGENCE: "true"
    
    # =====================================================================
    # Network Configuration
    # =====================================================================
    networks:
      - cqecmplx-kernel-net
    ports:
      - "8765:8765"    # Kernel HTTP API
      - "9000:9000"    # Kernel gRPC (optional)
    
    # =====================================================================
    # Health Check
    # =====================================================================
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # =====================================================================
    # Entry Point: Orchestrator with Hierarchy Enforcement
    # =====================================================================
    entrypoint: [
      "python",
      "-m",
      "cmplx_proof_kernel.orchestrator",
      "--level", "0",
      "--role", "orchestrator",
      "--docker-socket", "/var/run/docker.sock",
      "--network", "cqecmplx-kernel-net",
      "--child-memory", "2048",
      "--child-cpu", "2.0",
      "--max-papers", "8",
      "--serve"
    ]
    
    # =====================================================================
    # Logging
    # =====================================================================
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    
    # =====================================================================
    # Restart Policy
    # =====================================================================
    restart: unless-stopped
    depends_on:
      - docker-provider

  # =========================================================================
  # LEVEL 0 SUPPORT: Docker-in-Docker Provider
  # =========================================================================
  # This service provides Docker daemon access. It's not a Level 1 service—
  # it's infrastructure for Level 0 orchestration.
  
  docker-provider:
    image: docker:dind
    container_name: cqecmplx-docker-provider
    hostname: docker-provider
    privileged: true
    
    # =====================================================================
    # Storage: Persistent Docker images/containers for child validators
    # =====================================================================
    volumes:
      - docker_provider_storage:/var/lib/docker
      - /var/run/docker.sock:/var/run/docker.sock:rw
    
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      DOCKER_DRIVER: overlay2
    
    networks:
      - cqecmplx-kernel-net
    
    restart: unless-stopped

  # =========================================================================
  # LEVEL 1 TEMPLATE: Paper Validator Spawned by Orchestrator
  # =========================================================================
  # NOTE: This is a TEMPLATE. The orchestrator spawns instances of this
  # dynamically. We define it here for reference and docker-compose validation.
  #
  # For each paper (CQE-paper-00 through CQE-paper-31):
  #   1. Orchestrator creates a service named "paper-validator-{paper_id}"
  #   2. Container receives LEVEL 1 resources (2GB, 2 CPU)
  #   3. Mounts parent's cache (read-only)
  #   4. Cannot spawn children exceeding 1GB, 1 CPU
  
  # Example: paper-validator-00 (spawned dynamically)
  # This demonstrates the pattern for a single paper validator.
  
  paper-validator-template:
    image: python-dev:complete-stack
    # Container name format: cqecmplx-paper-{paper_id}-validator
    hostname: "paper-validator-{{ paper_id }}"
    
    # =====================================================================
    # LEVEL 1: 50% of Level 0 Resources
    # =====================================================================
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 2.0
    cpu_shares: 512        # Half of parent (1024 / 2)
    
    # =====================================================================
    # LEVEL 1: Child ulimits (50% of Level 0)
    # =====================================================================
    ulimits:
      nproc: 2048          # Children (Level 2) get 1024
      nofile: 32768        # Children (Level 2) get 16384
      locks: 512           # Children (Level 2) get 256
    
    # =====================================================================
    # Volumes: Mount parent cache, spawned sub-tools
    # =====================================================================
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Read-only access
      - docker_kernel_cache:/kernel_cache:ro          # Parent's cache (RO)
      - paper_validator_state:/var/lib/paper_validator # Local state
    
    environment:
      # Identify this as Level 1
      KERNEL_LEVEL: "1"
      KERNEL_ROLE: "paper_validator"
      PAPER_ID: "{{ paper_id }}"
      
      # Level 1 resource limits
      KERNEL_MAX_MEMORY_MB: 2048
      KERNEL_MAX_CPU: 2.0
      
      # Level 2 constraints (for tools spawned by this paper validator)
      CHILD_LEVEL: "2"
      CHILD_MEMORY_MB: 1024          # 50% of this level (2048 / 2)
      CHILD_CPU: 1.0                 # 50% of this level (2 / 2)
      CHILD_ULIMIT_NPROC: 1024
      CHILD_ULIMIT_NOFILE: 16384
      
      # Paper-specific settings
      DNA_SEQUENCE_SOURCE: "{{ dna_sequence_file }}"
      DNA_VALIDATION_MODE: "paper"
      PAPER_THEOREMS: "{{ paper_theorems }}"
      
      # Hierarchy enforcement
      PARENT_DOCKER_SOCKET: "/var/run/docker.sock"
      ORCHESTRATOR_NETWORK: "cqecmplx-kernel-net"
    
    networks:
      - cqecmplx-kernel-net
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    entrypoint: [
      "python",
      "-m",
      "cmplx_proof_kernel.paper_validator",
      "--level", "1",
      "--paper-id", "{{ paper_id }}",
      "--docker-socket", "/var/run/docker.sock",
      "--max-child-memory", "1024",
      "--max-child-cpu", "1.0"
    ]
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    
    restart: on-failure
    profiles: ["paper-validators"]  # Not started by default


# ============================================================================
# NETWORKS
# ============================================================================

networks:
  cqecmplx-kernel-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16


# ============================================================================
# VOLUMES
# ============================================================================

volumes:
  # Level 0 kernel cache (parent data)
  docker_kernel_cache:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=2g,uid=1000"
  
  # Docker provider storage (ephemeral for Level 1+ containers)
  docker_provider_storage:
    driver: local
  
  # Paper validator state (per-paper persistent state)
  paper_validator_state:
    driver: local
