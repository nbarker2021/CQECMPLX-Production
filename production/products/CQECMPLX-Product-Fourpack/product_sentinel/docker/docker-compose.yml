# Sentinel — Zero-Trust Security Monitor Demo Stack
#
# Services:
#   - sentinel-api: The main Sentinel FastAPI server
#   - prometheus: Metrics collection
#   - grafana: Visualization dashboard
#   - sentinel-agent: Linux monitoring agent (for demo)
#
# Usage:
#   cd docker && docker-compose up -d
#   # API: http://localhost:8000
#   # Grafana: http://localhost:3000 (admin/sentinel)
#   # Prometheus: http://localhost:9090

version: "3.8"

services:
  sentinel-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sentinel-api
    ports:
      - "8000:8000"
    environment:
      - SENTINEL_ENV=production
      - SENTINEL_LOG_LEVEL=info
    volumes:
      - sentinel-data:/data
    restart: unless-stopped
    networks:
      - sentinel-net

  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - sentinel-net

  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?set_GF_SECURITY_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboard.json:/etc/grafana/provisioning/dashboards/sentinel.json:ro
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    restart: unless-stopped
    networks:
      - sentinel-net

  sentinel-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sentinel-agent
    command: ["python", "-m", "sentinel.agents.linux_agent", "--api-url", "http://sentinel-api:8000", "--source", "demo-agent", "--interval", "10"]
    depends_on:
      - sentinel-api
    restart: unless-stopped
    networks:
      - sentinel-net
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

volumes:
  sentinel-data:
  prometheus-data:
  grafana-data:

networks:
  sentinel-net:
    driver: bridge
