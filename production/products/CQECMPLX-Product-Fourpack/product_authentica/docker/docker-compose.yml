# Authentica — Docker Compose
# =============================
# One-command deployment of the full Authentica platform.
#
# Quick start:
#   cd /mnt/agents/output/product_authentica
#   docker-compose -f docker/docker-compose.yml up -d
#
# Scale API workers:
#   docker-compose -f docker/docker-compose.yml up -d --scale api=3
#
# View logs:
#   docker-compose -f docker/docker-compose.yml logs -f api
#
# Stop:
#   docker-compose -f docker/docker-compose.yml down

version: "3.9"

services:
  # ── Main API Server ──
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: authentica-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AUTHENTICA_SECRET: ${AUTHENTICA_SECRET:?set_AUTHENTICA_SECRET}
      AUTHENTICA_ENV: ${AUTHENTICA_ENV:-production}
      AUTHENTICA_RATE_LIMIT: ${AUTHENTICA_RATE_LIMIT:-1000}
      PORT: "8000"
    volumes:
      # Mount for persistence (optional: replace with named volume in production)
      - authentica-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - authentica-network
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M

  # ── Redis Cache (optional — for rate limiting & sessions) ──
  # redis:
  #   image: redis:7-alpine
  #   container_name: authentica-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - authentica-network
  #   command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru

  # ── Nginx Reverse Proxy (optional — for SSL termination) ──
  # nginx:
  #   image: nginx:alpine
  #   container_name: authentica-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - api
  #   networks:
  #     - authentica-network

  # ── Prometheus Monitoring (optional) ──
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: authentica-prometheus
  #   restart: unless-stopped
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus-data:/prometheus
  #   networks:
  #     - authentica-network

networks:
  authentica-network:
    driver: bridge

volumes:
  authentica-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
