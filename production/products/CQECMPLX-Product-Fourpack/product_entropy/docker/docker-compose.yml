# EntropyCore — Docker Compose Deployment
# ========================================
#
# One-command deployment:
#   docker-compose up -d
#
# Scale:
#   docker-compose up -d --scale entropycore=4
#
# View logs:
#   docker-compose logs -f entropycore

version: "3.8"

services:
  entropycore:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: entropycore:latest
    container_name: entropycore-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENTROPY_LOG_LEVEL=info
      - ENTROPY_WORKERS=4
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - entropycore-net

  # Optional: nginx load balancer for multi-instance deployment
  nginx:
    image: nginx:alpine
    container_name: entropycore-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - entropycore
    restart: unless-stopped
    networks:
      - entropycore-net
    profiles:
      - lb  # Only start with: docker-compose --profile lb up -d

networks:
  entropycore-net:
    driver: bridge
